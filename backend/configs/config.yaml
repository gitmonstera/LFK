# configs/config.yaml - Полная конфигурация без необходимости .env
server:
  name: "lfk-backend"
  environment: "development"  # development, staging, production
  http_port: 8080
  grpc_port: 50051
  shutdown_timeout: 30s
  instances:
    min: 1
    max: 10
    id: "lfk-server-1"  # фиксированное значение вместо ${HOSTNAME}

database:
  postgres:
    master:
      host: "localhost"
      port: 5432
      user: "postgres"           # реальное значение
      password: "123456"         # реальное значение
      database: "lfkdb"
      ssl_mode: "disable"
      max_connections: 100
      min_connections: 10
      max_idle_connections: 10
      connection_max_lifetime: 1h
    replicas: []  # пока нет реплик

redis:
  mode: "standalone"  # standalone, cluster, sentinel
  addresses:
    - "localhost:6379"
  password: ""  # нет пароля для разработки
  pool_size: 100
  min_idle_conns: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

python_processor:
  pool:
    min_size: 1
    max_size: 5
    health_check_interval: 10s
    request_timeout: 5s
  service_discovery: "static"  # static, consul, kubernetes
  consul_address: "consul:8500"
  static_addresses:
    - "localhost:5001"  # адрес Python процессора

auth:
  jwt_secret: "your-super-secret-jwt-key-change-in-production-2024"  # фиксированный ключ
  token_duration: 24h
  refresh_token_duration: 720h

websocket:
  max_connections_per_server: 500
  read_buffer_size: 1048576  # 1MB
  write_buffer_size: 1048576  # 1MB
  read_timeout: 60s
  write_timeout: 60s
  ping_interval: 30s
  pong_timeout: 60s
  max_message_size: 10485760  # 10MB

load_balancer:
  type: "nginx"
  sticky_sessions: true
  health_check_path: "/health"
  health_check_interval: 10s

queues:
  frame_processing:
    name: "queue:python:tasks"
    max_size: 10000
    priority_levels: 3
    retry_count: 3
    retry_delay: 1s
  stats_update:
    name: "queue:stats:tasks"
    max_size: 5000
    workers: 5

cache:
  exercise_state_ttl: 5s
  user_session_ttl: 1h
  stats_ttl: 5m
  leaderboard_ttl: 1m

monitoring:
  enabled: true
  prometheus_port: 9090
  metrics_path: "/metrics"
  health_check:
    path: "/health"
    detailed_path: "/health/detailed"
  tracing:
    enabled: false
    provider: "jaeger"
    jaeger_address: "jaeger:6831"
    sample_rate: 0.1

logging:
  level: "debug"  # debug, info, warn, error
  format: "text"  # json, text
  output_paths:
    - "stdout"
  error_output_paths:
    - "stderr"

rate_limiting:
  enabled: false
  requests_per_second: 100
  burst: 200
  type: "token_bucket"

security:
  cors_allowed_origins:
    - "*"  # для разработки разрешаем все
  cors_allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  enable_https: false
  ssl_cert_path: ""
  ssl_key_path: ""