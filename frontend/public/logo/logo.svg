<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <radialGradient id="grad0" cx="100" cy="100" r="80" fx="20" fy="20">
            <stop offset="0%" stop-color="#FF764BA2"/>
            <stop offset="70%" stop-color="#FF667EEA"/>
            <stop offset="100%" stop-color="#00000000"/>
        </radialGradient>
        <linearGradient id="grad1" x1="85" y1="35" x2="115" y2="55">
            <stop offset="0%" stop-color="#FF667EEA"/>
            <stop offset="100%" stop-color="#FF764BA2"/>
        </linearGradient>
        <linearGradient id="grad2" x1="40" y1="60" x2="160" y2="175">
            <stop offset="0%" stop-color="#FF667EEA"/>
            <stop offset="50%" stop-color="#FF764BA2"/>
            <stop offset="100%" stop-color="#FF9F7AEA"/>
        </linearGradient>
    </defs>

    <!-- Эффект глубины: радиальное свечение -->
    <path d="M100,100 m-80,0 a80,80 0 1,1 160,0 a80,80 0 1,1 -160,0" fill="url(#grad0)" fill-opacity="0.1"/>

    <!-- Левая спираль ДНК -->
    <path d="M70,40 Q50,70 70,100 Q90,130 70,160" stroke="#FF667EEA" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8" fill="none"/>
    <path d="M70,55 Q55,80 70,105 Q85,130 70,155" stroke="#FF667EEA" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" stroke-dasharray="3,3" fill="none"/>

    <!-- Правая спираль ДНК -->
    <path d="M130,40 Q150,70 130,100 Q110,130 130,160" stroke="#FF764BA2" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8" fill="none"/>
    <path d="M130,55 Q145,80 130,105 Q115,130 130,155" stroke="#FF764BA2" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" stroke-dasharray="3,3" fill="none"/>

    <!-- Голова (кристалл здоровья) -->
    <path d="M100,35 L115,45 L100,55 L85,45 Z" fill="url(#grad1)"/>

    <!-- Блик на голове -->
    <path d="M95,42 L105,42 L100,48 Z" fill="#80FFFFFF" fill-opacity="0.4"/>

    <!-- Позвоночник/Ось -->
    <path d="M100,55 L100,145" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.2" stroke-linecap="round"/>

    <!-- Сердце -->
    <path d="M100,85 C70,60 40,85 40,115 C40,140 70,160 100,175 C130,160 160,140 160,115 C160,85 130,60 100,85 Z" fill="url(#grad2)"/>

    <!-- Линия пульса (ЭКГ) -->
    <path d="M70,120 L85,120 L90,105 L95,135 L100,115 L105,125 L110,110 L115,120 L130,120" stroke="#FFD700" stroke-width="2.5" stroke-opacity="0.9" stroke-linecap="round" fill="none"/>

    <!-- Левая рука -->
    <path d="M100,70 C85,70 70,65 60,50" stroke="#FF667EEA" stroke-width="5" stroke-linecap="round"/>
    <path d="M55,45 L48,40 L52,35" stroke="#FF667EEA" stroke-width="3" stroke-linecap="round"/>

    <!-- Правая рука -->
    <path d="M100,85 C115,90 130,95 138,110" stroke="#FF764BA2" stroke-width="5" stroke-linecap="round"/>
    <path d="M140,115 L148,112 L152,120" stroke="#FF764BA2" stroke-width="3" stroke-linecap="round"/>

    <!-- Левая нога -->
    <path d="M100,145 C95,160 85,175 75,185" stroke="#FF667EEA" stroke-width="5" stroke-linecap="round"/>

    <!-- Правая нога -->
    <path d="M100,145 C110,160 120,170 130,180" stroke="#FF764BA2" stroke-width="5" stroke-linecap="round"/>

    <!-- Суставы -->
    <circle cx="100" cy="70" r="3" fill="#FFD700" fill-opacity="0.6"/>
    <circle cx="100" cy="145" r="3" fill="#FFD700" fill-opacity="0.6"/>

    <!-- Атомные орбиты -->
    <path d="M40,40 Q70,20 100,40 Q130,60 160,40" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round" fill="none"/>
    <path d="M40,160 Q70,180 100,160 Q130,140 160,160" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round" fill="none"/>

    <!-- Мышечные волокна -->
    <path d="M90,120 L95,130" stroke="#80FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M110,120 L105,130" stroke="#80FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
</svg>